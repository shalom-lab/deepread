<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul" xmlns:html="http://www.w3.org/1999/xhtml"
	id="deepread-pref-fragment">
	<linkset>
		<html:link rel="localization" href="deepread.ftl" />
	</linkset>

	<groupbox>
		<caption data-l10n-id="deepread-pref-title" />

		<label data-l10n-id="deepread-pref-apikey" />
		<html:input id="deepread-apiKey-input" type="password" preference="extensions.deepread.apiKey"
			style="width: 100%;" />

		<label data-l10n-id="deepread-pref-model" />
		<menulist id="deepread-model-input" style="width: 100%;" preference="extensions.deepread.model">
			<menupopup>
				<menuitem label="gemini-3.1-flash-lite (主力-500次/日)" value="gemini-3.1-flash-lite-preview" />
				<menuitem label="gemini-2.5-flash-lite (20次/日)" value="gemini-2.5-flash-lite" />
				<menuitem label="gemini-3-flash (20次/日)" value="gemini-3-flash-preview" />
				<menuitem label="gemini-2.5-flash (重点推荐-20次/日)" value="gemini-2.5-flash" />
			</menupopup>
		</menulist>

		<label data-l10n-id="deepread-pref-temperature" />
		<html:input id="deepread-temperature-input" type="number" min="0" max="1" step="0.1"
			preference="extensions.deepread.temperature" style="width: 100%;" />

		<label data-l10n-id="deepread-pref-maxtokens" />
		<html:input id="deepread-maxTokens-input" type="number" min="1" max="8192"
			preference="extensions.deepread.maxTokens" style="width: 100%;" />

		<separator class="thin" />
		
		<html:div style="display: flex; align-items: center; margin-top: 10px;">
			<html:input type="checkbox" id="deepread-singlePdf-input" preference="extensions.deepread.singlePdfMode" />
			<html:label for="deepread-singlePdf-input" data-l10n-id="deepread-pref-singlepdf" style="margin-left: 5px; cursor: pointer; color: #333;" />
		</html:div>

		<separator class="thin" />

		<vbox style="margin-top: 15px; gap: 8px;">
			<!-- 额度查询链接 -->
			<label data-l10n-id="deepread-pref-quota"
				style="color: #2980b9; cursor: pointer; text-decoration: underline; font-size: 11px; font-weight: 500;"
				onclick="Zotero.launchURL('https://aistudio.google.com/rate-limit')" />

			<!-- Star 链接 -->
			<label data-l10n-id="deepread-pref-star"
				style="color: #c0392b; cursor: pointer; text-decoration: underline; font-size: 11px; font-weight: 500;"
				onclick="Zotero.launchURL('https://github.com/shalom-lab/deepread')" />
		</vbox>
	</groupbox>

</vbox>
